{% extends 'base.html' %}
{% block title %}Cadastro | Core Digital Aragão{% endblock %}
{% block content %}
<section class="section">
    <div class="container narrow">
        <div class="auth-card reveal">
            <span class="eyebrow">Novo cliente</span>
            <h1>Criar conta</h1>
            <form method="post" class="form-grid top-gap">
                <label><span>Nome</span><input type="text" name="name" required></label>
                <label><span>E-mail</span><input type="email" name="email" required></label>
                <label><span>Senha</span><input type="password" name="password" required></label>
                <button class="btn btn-primary" type="submit">Cadastrar</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
